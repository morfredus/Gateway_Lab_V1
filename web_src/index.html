<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab V1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem;
    }
    /* ── Site header ─────────────────────────────────────────── */
    .site-hdr {
      width: 100%; max-width: 520px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.1rem 0 0.9rem;
    }
    .site-name {
      font-size: 1.05rem; font-weight: 700; color: #f1f5f9;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .site-ver {
      font-size: 0.63rem; font-weight: 700; letter-spacing: 0.05em;
      color: #06b6d4; background: #0c2a40;
      padding: 0.15rem 0.45rem; border-radius: 4px;
    }
    .site-tag { font-size: 0.72rem; color: #94a3b8; }
    /* ── Navigation ──────────────────────────────────────────── */
    nav {
      width: 100%; max-width: 520px;
      display: flex; gap: 0.25rem;
      padding: 0.6rem 0;
      border-top: 1px solid #ffffff0a;
      border-bottom: 1px solid #ffffff0a;
      margin-bottom: 1.5rem;
    }
    nav a {
      font-size: 0.8rem; padding: 0.35rem 0.8rem;
      border-radius: 6px; text-decoration: none;
      color: #94a3b8; transition: background 0.15s, color 0.15s;
    }
    nav a:hover  { background: #1e293b; color: #e2e8f0; }
    nav a.active { background: #0c4a6e; color: #38bdf8; font-weight: 600; }
    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: #1e293b; border-radius: 12px; padding: 1.5rem;
      width: 100%; max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      margin-bottom: 1.5rem;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .card-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: #94a3b8; font-weight: 600; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.65rem 0; border-bottom: 1px solid #ffffff0a;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #94a3b8; font-size: 0.875rem; }
    .info-value { color: #f1f5f9; font-size: 0.875rem; font-weight: 600; text-align: right; }
    .badge { padding: 0.2rem 0.7rem; border-radius: 999px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; }
    .badge-ok   { background: #064e3b; color: #10b981; }
    .badge-warn { background: #451a03; color: #f59e0b; }
    /* ── Shortcuts ───────────────────────────────────────────── */
    .shortcuts { display: flex; gap: 0.75rem; width: 100%; max-width: 520px; margin-bottom: 1.5rem; }
    .shortcut {
      flex: 1; padding: 0.875rem 0.5rem;
      background: #1e293b; color: #94a3b8;
      border: 1px solid #ffffff0a; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600;
      text-align: center; text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .shortcut:hover { background: #0c4a6e; color: #38bdf8; }
    .shortcut .icon { display: block; font-size: 1.4rem; margin-bottom: 0.3rem; }
    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      width: 100%; max-width: 520px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0 1.5rem;
      border-top: 1px solid #ffffff0a;
      margin-top: auto;
      font-size: 0.78rem; color: #94a3b8;
    }
    footer a { color: #38bdf8; text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab&nbsp;V1
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Passerelle réseau locale</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>
    <a href="/" class="active">Accueil</a>
    <a href="/scan">Équipements</a>
    <a href="/update">OTA</a>
  </nav>

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <p class="card-title">Informations réseau</p>
      <span class="badge badge-ok" id="status-badge">Connecté</span>
    </div>
    <div class="info-row">
      <span class="info-label">SSID</span>
      <span class="info-value" id="ssid">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">IP locale</span>
      <span class="info-value" id="ip">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Signal (RSSI)</span>
      <span class="info-value" id="rssi">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">mDNS</span>
      <span class="info-value" id="hostname">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Uptime</span>
      <span class="info-value" id="uptime">—</span>
    </div>
  </div>

  <div class="shortcuts">
    <a class="shortcut" href="/scan">
      <span class="icon">📡</span>Équipements
    </a>
    <a class="shortcut" href="/update">
      <span class="icon">🔄</span>Mise à jour
    </a>
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span id="footer-ts">—</span>
    <span id="footer-mdns" style="color:#64748b"></span>
  </footer>

  <script>
    function fmtUptime(ms) {
      var s = Math.floor(ms / 1000);
      var m = Math.floor(s / 60); s %= 60;
      var h = Math.floor(m / 60); m %= 60;
      var d = Math.floor(h / 24); h %= 24;
      return (d > 0 ? d + 'j ' : '') + h + 'h ' + m + 'm ' + s + 's';
    }
    function rssiQuality(r) {
      if (r >= -50) return 'Excellent';
      if (r >= -60) return 'Bon';
      if (r >= -70) return 'Moyen';
      return 'Faible';
    }
    function refresh() {
      fetch('/api/status')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          document.getElementById('ssid').textContent     = d.ssid || '—';
          document.getElementById('ip').textContent       = d.ip   || '—';
          document.getElementById('rssi').textContent     = d.rssi + ' dBm (' + rssiQuality(d.rssi) + ')';
          document.getElementById('hostname').textContent = d.hostname ? d.hostname + '.local' : '—';
          document.getElementById('uptime').textContent   = fmtUptime(d.uptime || 0);
          if (d.version) {
            document.getElementById('site-ver').textContent   = 'v' + d.version;
            document.getElementById('footer-mdns').textContent = d.hostname ? d.hostname + '.local' : '';
          }
          document.getElementById('status-badge').className   = 'badge badge-ok';
          document.getElementById('status-badge').textContent = 'Connecté';
          document.getElementById('footer-ts').textContent    = 'Actualisé : ' + new Date().toLocaleTimeString('fr-FR');
        })
        .catch(function() {
          document.getElementById('status-badge').className   = 'badge badge-warn';
          document.getElementById('status-badge').textContent = 'Erreur';
          document.getElementById('footer-ts').textContent    = 'Erreur de connexion';
        });
    }
    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
