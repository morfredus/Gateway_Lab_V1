<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab V1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab&nbsp;V1
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Passerelle réseau locale</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>
    <a href="/" class="active">Accueil</a>
    <a href="/scan">Équipements</a>
    <a href="/update">OTA</a>
  </nav>

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <p class="card-title">Informations réseau</p>
      <span class="badge badge-ok" id="status-badge">Connecté</span>
    </div>
    <div class="info-row">
      <span class="info-label">SSID</span>
      <span class="info-value" id="ssid">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">IP locale</span>
      <span class="info-value" id="ip">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Signal (RSSI)</span>
      <span class="info-value" id="rssi">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">mDNS</span>
      <span class="info-value" id="hostname">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Uptime</span>
      <span class="info-value" id="uptime">—</span>
    </div>
  </div>

  <div class="shortcuts">
    <a class="shortcut" href="/scan">
      <span class="icon">📡</span>Équipements
    </a>
    <a class="shortcut" href="/update">
      <span class="icon">🔄</span>Mise à jour
    </a>
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span id="footer-ts">—</span>
    <span id="footer-mdns" style="color:#64748b"></span>
  </footer>

  <script>
    function fmtUptime(ms) {
      var s = Math.floor(ms / 1000);
      var m = Math.floor(s / 60); s %= 60;
      var h = Math.floor(m / 60); m %= 60;
      var d = Math.floor(h / 24); h %= 24;
      return (d > 0 ? d + 'j ' : '') + h + 'h ' + m + 'm ' + s + 's';
    }
    function rssiQuality(r) {
      if (r >= -50) return 'Excellent';
      if (r >= -60) return 'Bon';
      if (r >= -70) return 'Moyen';
      return 'Faible';
    }
    function refresh() {
      fetch('/api/status')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          document.getElementById('ssid').textContent     = d.ssid || '—';
          document.getElementById('ip').textContent       = d.ip   || '—';
          document.getElementById('rssi').textContent     = d.rssi + ' dBm (' + rssiQuality(d.rssi) + ')';
          document.getElementById('hostname').textContent = d.hostname ? d.hostname + '.local' : '—';
          document.getElementById('uptime').textContent   = fmtUptime(d.uptime || 0);
          if (d.version) {
            document.getElementById('site-ver').textContent   = 'v' + d.version;
            document.getElementById('footer-mdns').textContent = d.hostname ? d.hostname + '.local' : '';
          }
          document.getElementById('status-badge').className   = 'badge badge-ok';
          document.getElementById('status-badge').textContent = 'Connecté';
          document.getElementById('footer-ts').textContent    = 'Actualisé : ' + new Date().toLocaleTimeString('fr-FR');
        })
        .catch(function() {
          document.getElementById('status-badge').className   = 'badge badge-warn';
          document.getElementById('status-badge').textContent = 'Erreur';
          document.getElementById('footer-ts').textContent    = 'Erreur de connexion';
        });
    }
    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
