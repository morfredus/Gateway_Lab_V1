<!DOCTYPE html>
<!--
  Gateway Lab — Gabarit de référence
  ======================================
  Ce fichier documente la structure HTML commune aux trois pages de l'interface.
  Il n'est PAS traité par minify_web.py (non listé dans PAGES).

  Pages réelles (sources à modifier) :
    web_src/index.html   →  include/web_interface.h       (route GET /)
    web_src/scan.html    →  include/web_interface_scan.h  (route GET /scan)
    web_src/wifi.html    →  include/web_interface_wifi.h  (route GET /wifi, page Système)

  CSS commun :
    web_src/styles.css   →  injecté inline par minify_web.py à la place de
                            <link rel="stylesheet" href="styles.css">

  Navigation commune :
    web_src/menu.html    →  injecté inline par minify_web.py à la place de
                            <!-- include:menu.html -->

  Workflow :
    1. Modifier web_src/*.html, web_src/menu.html ou web_src/styles.css
    2. python tools/minify_web.py
    3. pio run --target upload
-->
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab — [Titre de page]</title>

  <!-- CSS commun (reset, body, .site-name/ver/tag, nav a, footer a) -->
  <link rel="stylesheet" href="styles.css">

  <!-- CSS spécifique à la page :
       - .site-hdr, nav, footer (avec max-width selon page : 520px ou 960px)
       - composants propres à la page (.card, table, formulaire…)
  -->
  <style>
    .site-hdr {
      width: 100%; max-width: 520px; /* ou 960px pour /scan */
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.1rem 0 0.9rem;
    }
    nav {
      width: 100%; max-width: 520px;
      display: flex; gap: 0.25rem;
      padding: 0.6rem 0;
      border-top: 1px solid #ffffff0a;
      border-bottom: 1px solid #ffffff0a;
      margin-bottom: 1.5rem;
    }
    footer {
      width: 100%; max-width: 520px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 0 1.5rem;
      border-top: 1px solid #ffffff0a;
      margin-top: auto;
      font-size: 0.78rem; color: #94a3b8;
    }
    /* … styles spécifiques à la page … */
  </style>
</head>
<body>

  <!-- ── En-tête ────────────────────────────────────────────── -->
  <!-- Identique sur les 3 pages ; seul site-tag change -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab
      <span class="site-ver" id="site-ver">v—</span>
      <!-- Rempli par JS : fetch('/api/status').then(d => site-ver.textContent = 'v' + d.version) -->
    </div>
    <span class="site-tag">Titre contextuel de la page</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <!-- Bloc partagé web_src/menu.html, inliné par minify_web.py.
       Le lien actif (class="active") est marqué au runtime par le script
       embarqué dans menu.html, en comparant href à window.location.pathname. -->
  <!-- include:menu.html -->

  <!-- ── Contenu de la page ────────────────────────────────── -->
  <!-- Varie selon la page :
       /        → carte Informations réseau + raccourcis
       /scan    → carte tableau des équipements + bouton Lancer un scan
       /wifi    → page Système : réseau WiFi, LED, mise à jour firmware, état système
  -->
  <main>
    <!-- contenu ici -->
  </main>

  <!-- ── Pied de page ──────────────────────────────────────── -->
  <!-- Identique sur toutes les pages ; contenu rempli par JS -->
  <footer>
    <span id="footer-ts">—</span>
    <!-- Accueil  : "Actualisé : HH:MM:SS"      (+ adresse mDNS à droite) -->
    <!-- Scan     : "N équipements — Actualisé : HH:MM:SS" -->
    <!-- Système  : horodatage courant -->
    <a href="/">← Accueil</a>
    <!-- Absent sur la page Accueil (remplacé par l'adresse mDNS) -->
  </footer>

  <script>
    // Récupère la version au chargement (commun à toutes les pages)
    fetch('/api/status').then(function(r) { return r.json(); }).then(function(d) {
      if (d.version) document.getElementById('site-ver').textContent = 'v' + d.version;
      // … mise à jour du pied de page selon la page …
    }).catch(function() {});
  </script>

</body>
</html>
