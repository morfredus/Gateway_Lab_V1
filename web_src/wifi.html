<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab V1 — Réseau WiFi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-scan">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab&nbsp;V1
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Paramètres — Réseau WiFi</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>
    <a href="/">Accueil</a>
    <a href="/scan">Équipements</a>
    <a href="/history">Historique</a>
    <a href="/topology">Topologie</a>
    <a href="/update">OTA</a>
    <a href="/wifi" class="active">Paramètres</a>
  </nav>

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <p class="card-title">État de la connexion</p>
      <span class="badge badge-ok" id="status-badge">Connecté</span>
    </div>
    <div class="info-row">
      <span class="info-label">SSID</span>
      <span class="info-value" id="wifi-ssid">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Adresse IP</span>
      <span class="info-value" id="wifi-ip">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Signal (RSSI)</span>
      <span class="info-value" id="wifi-rssi">—</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <p class="card-title">Réseaux enregistrés</p>
    </div>
    <div id="wifi-list"></div>
    <p class="empty-msg" id="wifi-empty" style="display:none">Aucun réseau enregistré pour le moment.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <p class="card-title">Ajouter un réseau</p>
    </div>
    <form id="wifi-form">
      <label for="wifi-new-ssid">SSID</label>
      <input id="wifi-new-ssid" type="text" placeholder="Nom du réseau" autocomplete="off" required>
      <label for="wifi-new-password">Mot de passe</label>
      <input id="wifi-new-password" type="password" placeholder="Mot de passe WiFi" autocomplete="off">
      <button class="btn" type="submit">Enregistrer ce réseau</button>
    </form>
    <p id="wifi-msg"></p>
  </div>

  <div class="card">
    <div class="card-header">
      <p class="card-title">Luminosité de la LED d'état</p>
    </div>
    <label for="led-brightness">Luminosité (<span id="led-brightness-value">—</span>%)</label>
    <input id="led-brightness" type="range" min="0" max="100" step="5" value="15">
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span id="footer-ts">—</span>
    <a href="/">← Accueil</a>
  </footer>

  <script src="wifi.js"></script>
</body>
</html>
