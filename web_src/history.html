<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab V1 - Historique</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-scan">

  <!-- ── Header ─────────────────────────────────────────────── -->

      Gateway Lab&nbsp;V1
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Passerelle réseau locale</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>

    <a href="/scan">Équipements</a>
    <a href="/history" class="active">Historique</a>
    <a href="/update">OTA</a>

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <p class="card-title">Vue chronologique</p>

  <footer>
    <span id="footer-ts">—</span>
