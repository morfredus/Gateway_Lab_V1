<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab V1 — Équipements</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-scan">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab&nbsp;V1
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Équipements réseau</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>
    <a href="/">Accueil</a>
    <a href="/scan" class="active">Équipements</a>
    <a href="/history">Historique</a>
    <a href="/update">OTA</a>
    <a href="/wifi">Paramètres</a>
  </nav>

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <div>
        <p class="card-title">Équipements détectés</p>
        <p class="card-meta" id="scan-meta">Aucun scan effectué</p>
      </div>
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">Scanner</button>
    </div>

    <div class="stats-bar" id="stats-bar" style="display:none">
      <span class="stat-item stat-known"  id="stat-known">— connus</span>
      <span class="stat-sep">·</span>
      <span class="stat-item stat-online" id="stat-online">— en ligne</span>
      <span class="stat-sep">·</span>
      <span class="stat-item stat-offline" id="stat-offline">— hors ligne</span>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <p class="scan-info" id="scan-info" style="display:none"></p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>IP</th>
            <th>Nom d'hôte</th>
            <th>Fabricant</th>
            <th>Catégorie</th>
            <th>MAC</th>
            <th>Vu il y a</th>
          </tr>
        </thead>
        <tbody id="devices-body">
          <tr><td colspan="7" class="empty-msg">Cliquez sur "Scanner" pour détecter les équipements</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span id="footer-ts">—</span>
    <a href="/">← Accueil</a>
  </footer>

  <script src="scan.js"></script>
</body>
</html>
