<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab V1 — Mise à jour OTA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-scan">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab&nbsp;V1
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Mise à jour OTA</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <nav>
    <a href="/">Accueil</a>
    <a href="/scan">Équipements</a>
    <a href="/history">Historique</a>
    <a href="/topology">Topologie</a>
    <a href="/update" class="active">OTA</a>
    <a href="/wifi">Paramètres</a>
  </nav>

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card card-center">
    <p class="card-title">Mise à jour du firmware</p>
    <form id="f">
      <label>Sélectionnez le fichier firmware (.bin)</label>
      <input type="file" id="fw" accept=".bin">
      <button type="submit" class="btn">Mettre à jour</button>
    </form>
    <div class="progress" id="pg">
      <div class="bar" id="bar"></div>
    </div>
    <p id="msg"></p>
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span id="footer-ts">—</span>
    <a href="/">← Accueil</a>
  </footer>

  <script src="ota.js"></script>
</body>
</html>
