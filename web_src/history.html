<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gateway Lab - Historique</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-scan">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="site-hdr">
    <div class="site-name">
      Gateway Lab
      <span class="site-ver" id="site-ver">v—</span>
    </div>
    <span class="site-tag">Historique</span>
  </header>

  <!-- ── Navigation ────────────────────────────────────────── -->
  <!-- include:menu.html -->

  <!-- ── Contenu ───────────────────────────────────────────── -->
  <div class="card">
    <div class="card-header">
      <p class="card-title">Vue chronologique</p>
      <button class="reset-btn" id="clear-history-btn" onclick="clearHistory()">Vider l'historique</button>
    </div>
    <p class="info-label" style="margin-bottom:0.9rem">
      Journal des nouveaux équipements, reconnexions, déconnexions et changements
      de champs détectés entre deux scans (100 derniers événements).
    </p>
    <div class="hist-filters" id="hist-filters">
      <label><input type="checkbox" class="hist-filter" value="new"     checked> Nouveaux équipements</label>
      <label><input type="checkbox" class="hist-filter" value="online"  checked> Reconnexions</label>
      <label><input type="checkbox" class="hist-filter" value="offline" checked> Déconnexions</label>
      <label><input type="checkbox" class="hist-filter" value="changed" checked> Changements de champs</label>
      <label><input type="checkbox" id="hist-filter-favorite"> Favoris uniquement</label>
    </div>
    <div id="history-list"></div>
    <p class="empty-msg" id="history-empty" style="display:none">Aucun événement enregistré pour le moment.</p>
  </div>

  <!-- ── Footer ────────────────────────────────────────────── -->
  <footer>
    <span id="footer-ts">—</span>
  </footer>

  <script src="history.js"></script>
</body>
</html>
